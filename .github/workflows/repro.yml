name: Reproduce zensical/zensical#726

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Build docs-delay shim
        run: |
          cat > /tmp/delay_docs.c << 'EOF'
          /*
           * Intercept file-open calls and sleep 2 s the first time the process
           * opens the docs/ directory of the current project.  This widens the
           * race window in zensical 0.0.43 (docs dir watched last) enough to
           * guarantee the scheduler idle-timeout fires before any markdown file
           * is inserted, so site/index.html is never generated.
           *
           * Uses the absolute CWD/docs path (set in the constructor) so that
           * opens of unrelated "docs" dirs during uvx package installation do
           * not trigger the delay prematurely.
           */
          #define _GNU_SOURCE
          #include <dlfcn.h>
          #include <dirent.h>
          #include <fcntl.h>
          #include <stdarg.h>
          #include <stdio.h>
          #include <string.h>
          #include <time.h>
          #include <unistd.h>

          static int  fired;
          static char target[4096];

          __attribute__((constructor)) static void init(void) {
              char cwd[4096];
              if (getcwd(cwd, sizeof(cwd)))
                  snprintf(target, sizeof(target), "%s/docs", cwd);
              fprintf(stderr, "[delay_docs] armed for: %s\n", target);
          }

          static void maybe_delay(const char *path) {
              if (!path || fired || !target[0]) return;
              if (strcmp(path, target) == 0) {
                  fired = 1;
                  fprintf(stderr, "[delay_docs] 2s delay before docs scan\n");
                  struct timespec ts = {2, 0};
                  nanosleep(&ts, NULL);
                  fprintf(stderr, "[delay_docs] delay done\n");
              }
          }

          int openat(int dfd, const char *p, int fl, ...) {
              static int (*r)(int, const char *, int, ...);
              if (!r) r = dlsym(RTLD_NEXT, "openat");
              maybe_delay(p);
              if (fl & O_CREAT) { va_list a; va_start(a,fl); mode_t m=va_arg(a,mode_t); va_end(a); return r(dfd,p,fl,m); }
              return r(dfd,p,fl);
          }

          int openat64(int dfd, const char *p, int fl, ...) {
              static int (*r)(int, const char *, int, ...);
              if (!r) r = dlsym(RTLD_NEXT, "openat64");
              if (!r) r = dlsym(RTLD_NEXT, "openat");
              maybe_delay(p);
              if (fl & O_CREAT) { va_list a; va_start(a,fl); mode_t m=va_arg(a,mode_t); va_end(a); return r(dfd,p,fl,m); }
              return r(dfd,p,fl);
          }

          int open(const char *p, int fl, ...) {
              static int (*r)(const char *, int, ...);
              if (!r) r = dlsym(RTLD_NEXT, "open");
              maybe_delay(p);
              if (fl & O_CREAT) { va_list a; va_start(a,fl); mode_t m=va_arg(a,mode_t); va_end(a); return r(p,fl,m); }
              return r(p,fl);
          }

          int open64(const char *p, int fl, ...) {
              static int (*r)(const char *, int, ...);
              if (!r) r = dlsym(RTLD_NEXT, "open64");
              if (!r) r = dlsym(RTLD_NEXT, "open");
              maybe_delay(p);
              if (fl & O_CREAT) { va_list a; va_start(a,fl); mode_t m=va_arg(a,mode_t); va_end(a); return r(p,fl,m); }
              return r(p,fl);
          }

          DIR *opendir(const char *p) {
              static DIR *(*r)(const char *);
              if (!r) r = dlsym(RTLD_NEXT, "opendir");
              maybe_delay(p);
              return r(p);
          }
          EOF
          gcc -shared -fPIC -o /tmp/delay_docs.so /tmp/delay_docs.c -ldl
          echo "shim compiled OK"

      - name: Build site (docs scan delayed via LD_PRELOAD)
        run: LD_PRELOAD=/tmp/delay_docs.so uvx zensical==0.0.43 build

      - name: Assert site/index.html was generated
        run: |
          echo "site/ contents:"
          find site -type f | sort
          test -f site/index.html || (echo "FAIL: site/index.html missing — bug reproduced" && exit 1)
