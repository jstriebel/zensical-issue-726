name: Reproduce zensical/zensical#726

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone zensical 0.0.43
        run: |
          git clone https://github.com/zensical/zensical \
            --branch v0.0.43 --depth 1 zensical-src

      - name: Apply race-determinism patch
        run: patch -p1 -d zensical-src < race.patch

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: zensical-src

      - uses: astral-sh/setup-uv@v5

      - name: Build patched wheel
        run: uvx maturin build --release --out dist
        working-directory: zensical-src

      - name: Build site
        run: |
          # Install official 0.0.43 from PyPI — it has the pre-built theme
          # assets (templates/, .icons/, etc.) that are not in the git tree.
          python3 -m venv /tmp/zenv
          /tmp/zenv/bin/pip install --quiet "zensical==0.0.43"

          # Hot-swap the compiled extension (.so) with our patched build.
          # The race patch only touches Rust; all Python and theme files stay
          # as shipped by PyPI.
          patched_wheel=$(ls zensical-src/dist/zensical-*.whl)
          site_dir=$(/tmp/zenv/bin/python3 \
            -c "import site; print(site.getsitepackages()[0])")
          so=$(unzip -l "$patched_wheel" | tail -n +4 | head -n -2 \
            | awk '{print $NF}' | grep '\.so$')
          echo "Replacing $so"
          unzip -p "$patched_wheel" "$so" > "$site_dir/$so"

          /tmp/zenv/bin/zensical build

      - name: Assert site/index.html was generated
        run: |
          echo "site/ contents:"
          find site -type f | sort
          test -f site/index.html || \
            (echo "FAIL: site/index.html missing — bug reproduced" && exit 1)
